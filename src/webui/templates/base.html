<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyrene</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.11/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
</head>
<body>
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">✦</span>
      <span class="nav-title">Cyrene</span>
    </div>
    <div class="nav-links">
      <a href="/" class="nav-link {% if page == 'chat' %}active{% endif %}">Chat</a>
      <a href="/status" class="nav-link {% if page == 'status' %}active{% endif %}">Status</a>
      <a href="/settings" class="nav-link {% if page == 'settings' %}active{% endif %}">Settings</a>
    </div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
