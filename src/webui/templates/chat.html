{% extends "base.html" %}
{% block content %}
<div class="app-layout">
  <!-- Left: Agent Timeline -->
  <div class="sidebar sidebar-left">
    <div class="sidebar-header">Timeline</div>
    <div class="sidebar-content" id="timeline-list">
      <div class="timeline-empty">Waiting for events...</div>
    </div>
  </div>

  <!-- Center: Chat -->
  <div class="chat-center">
    <div id="message-list" class="message-list">
      <div class="empty-state">Send a message to start.</div>
    </div>

    <div class="input-area">
      <form id="chat-form" class="chat-form">
        <input id="chat-input" class="chat-input" type="text" placeholder="Type a message..." autofocus autocomplete="off">
        <button type="submit" class="send-btn" aria-label="Send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </form>
      <div id="typing-indicator" class="typing-indicator">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      </div>
    </div>
  </div>

  <!-- Right: Subagents -->
  <div class="sidebar sidebar-right">
    <div class="sidebar-header">Subagents</div>
    <div class="sidebar-content" id="subagent-list">
      <div class="sidebar-empty">
        <span class="sidebar-muted">No subagents</span>
      </div>
    </div>
  </div>
</div>

<div id="tooltip" class="tooltip" style="display:none"></div>

<script>
(function() {
  'use strict';

  const state = {
    messages: [],
    events: [],
    es: null,
  };

  const messageList = document.getElementById('message-list');
  const chatForm = document.getElementById('chat-form');
  const chatInput = document.getElementById('chat-input');
  const typingIndicator = document.getElementById('typing-indicator');
  const timelineList = document.getElementById('timeline-list');
  const tooltipEl = document.getElementById('tooltip');

  // --- Messages ---

  async function loadMessages() {
    try {
      var resp = await fetch('/api/chat/history');
      if (!resp.ok) return;
      var data = await resp.json();
      state.messages = data.messages || [];
      renderMessages();
    } catch (err) {
      console.error('Failed to load messages:', err);
    }
  }

  function renderMessages() {
    if (state.messages.length === 0) {
      messageList.innerHTML = '<div class="empty-state">Send a message to start.</div>';
      return;
    }
    messageList.innerHTML = state.messages.map(msgHtml).join('');
    scrollToBottom();
  }

  function appendMessage(msg) {
    state.messages.push(msg);
    var emptyEl = messageList.querySelector('.empty-state');
    if (emptyEl) emptyEl.remove();

    var div = document.createElement('div');
    div.innerHTML = msgHtml(msg);
    messageList.appendChild(div.firstElementChild);
    scrollToBottom();
  }

  function scrollToBottom() {
    requestAnimationFrame(function() {
      messageList.scrollTop = messageList.scrollHeight;
    });
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderMarkdown(text) {
    if (!text) return '';
    try {
      var raw = marked.parse(text, { breaks: true, gfm: true });
      return DOMPurify.sanitize(raw, { ADD_ATTR: ['target'] });
    } catch (e) {
      return escapeHtml(text);
    }
  }

  function msgHtml(msg) {
    var label = msg.role === 'user' ? 'You' : 'Cyrene';
    var body = msg.role === 'user'
      ? escapeHtml(msg.content)
      : renderMarkdown(msg.content);
    return '<div class="message ' + msg.role + '">' +
      '<div class="msg-label">' + label + '</div>' +
      '<div class="msg-content">' + body + '</div>' +
      '</div>';
  }

  // --- Send ---

  chatForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    var text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = '';
    chatInput.disabled = true;
    typingIndicator.style.display = 'flex';

    appendMessage({ role: 'user', content: text });

    try {
      var resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      if (!resp.ok) throw new Error(await resp.text());
      var data = await resp.json();
      if (data.response) {
        appendMessage({ role: 'assistant', content: data.response });
      }
    } catch (err) {
      console.error('Send failed:', err);
      appendMessage({ role: 'assistant', content: '⚠️ Failed to send message.' });
    } finally {
      chatInput.disabled = false;
      chatInput.focus();
      typingIndicator.style.display = 'none';
    }
  });

  // --- SSE ---

  function connectSSE() {
    if (state.es) state.es.close();

    state.es = new EventSource('/api/events');
    state.es.onmessage = function(e) {
      try {
        var ev = JSON.parse(e.data);
        if (ev.type === 'heartbeat') return;
        addTimelineEvent(ev);
      } catch (err) {
        console.warn('SSE error:', err);
      }
    };
    state.es.onerror = function() {
      state.es.close();
      setTimeout(connectSSE, 3000);
    };
  }

  // --- Timeline (HTML sidebar) ---

  var EVENT_LABELS = {
    'llm_call': 'LLM',
    'tool_call': undefined,  // will use ev.tool
    'chat_filter': 'Filter',
    'chat_message': 'Message',
  };

  function agentColor(name) {
    var colors = { main_agent: '#6366f1', chat_filter: '#f59e0b', execution: '#10b981' };
    if (name && name in colors) return colors[name];
    if (name && name.startsWith('subagent_')) return '#2196F3';
    return '#71717a';
  }

  function eventLabel(ev) {
    if (ev.type === 'tool_call') return ev.tool || 'tool';
    return EVENT_LABELS[ev.type] || ev.type;
  }

  function addTimelineEvent(ev) {
    state.events.push(ev);
    if (state.events.length > 500) state.events.shift();

    // Remove empty state
    var emptyEl = timelineList.querySelector('.timeline-empty');
    if (emptyEl) emptyEl.remove();

    var color = agentColor(ev.caller);
    var label = eventLabel(ev);

    var row = document.createElement('div');
    row.className = 'timeline-row';
    row.innerHTML =
      '<span class="tl-dot" style="background:' + color + '"></span>' +
      '<span class="tl-caller">' + escapeHtml(ev.caller || '?') + '</span>' +
      '<span class="tl-label">' + escapeHtml(label) + '</span>';
    row.title = JSON.stringify(ev, null, 2);
    row.addEventListener('click', function() {
      showTooltip(row, this.title);
    });
    timelineList.appendChild(row);
    timelineList.scrollTop = timelineList.scrollHeight;
  }

  function showTooltip(anchor, html) {
    tooltipEl.style.display = 'block';
    tooltipEl.innerHTML = '<pre>' + escapeHtml(html) + '</pre>';
    var rect = anchor.getBoundingClientRect();
    var left = rect.right + 8;
    var top = rect.top;
    var tr = tooltipEl.getBoundingClientRect();
    if (left + tr.width > window.innerWidth - 10) left = window.innerWidth - tr.width - 10;
    if (top + tr.height > window.innerHeight - 10) top = window.innerHeight - tr.height - 10;
    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';

    function hide(e) {
      tooltipEl.style.display = 'none';
      document.removeEventListener('click', hide);
    }
    setTimeout(function() { document.addEventListener('click', hide); }, 100);
  }

  // --- Subagents ---

  var subagentList = document.getElementById('subagent-list');
  var SUBAGENT_POLL_MS = 3000;

  async function pollSubagents() {
    try {
      var resp = await fetch('/api/subagents');
      if (!resp.ok) return;
      var data = await resp.json();
      renderSubagents(data);
    } catch (err) {
      // ignore poll errors
    }
  }

  function statusBadge(status) {
    var colors = {
      running: '#6366f1',
      waiting: '#f59e0b',
      resumed: '#10b981',
      done: '#71717a',
      timeout: '#ef4444',
    };
    var labels = {
      running: 'Running',
      waiting: 'Waiting',
      resumed: 'Active',
      done: 'Done',
      timeout: 'Timeout',
    };
    var color = colors[status] || '#71717a';
    var label = labels[status] || status;
    return '<span class="sa-badge" style="background:' + color + '">' + label + '</span>';
  }

  function renderSubagents(data) {
    var keys = Object.keys(data);
    if (keys.length === 0) {
      subagentList.innerHTML = '<div class="sidebar-empty"><span class="sidebar-muted">No subagents</span></div>';
      return;
    }

    var html = '';
    for (var i = 0; i < keys.length; i++) {
      var id = keys[i];
      var sa = data[id];
      html += '<div class="sa-card">' +
        '<div class="sa-header">' +
        '<span class="sa-id">' + escapeHtml(id) + '</span>' +
        statusBadge(sa.status) +
        '</div>' +
        '<div class="sa-task">' + escapeHtml(sa.task) + '</div>';

      if (sa.messages && sa.messages.length > 0) {
        html += '<div class="sa-conv">';
        for (var j = 0; j < sa.messages.length; j++) {
          var m = sa.messages[j];
          if (m.role === 'system') continue;
          var roleLabel = m.role === 'user' ? 'User' : (m.role === 'assistant' ? 'Agent' : 'Tool');
          var content = m.content || '';
          if (content.length > 300) content = content.slice(0, 300) + '...';
          html += '<div class="sa-msg sa-msg-' + m.role + '">' +
            '<span class="sa-msg-label">' + roleLabel + '</span>' +
            '<span class="sa-msg-text">' + escapeHtml(content) + '</span>' +
            '</div>';
          if (m.tool_calls) {
            for (var k = 0; k < m.tool_calls.length; k++) {
              html += '<div class="sa-msg sa-msg-tool">' +
                '<span class="sa-msg-label">Tool</span>' +
                '<span class="sa-msg-text">' + escapeHtml(m.tool_calls[k].name) + '</span>' +
                '</div>';
            }
          }
        }
        html += '</div>';
      }

      if (sa.result) {
        html += '<div class="sa-result">' + escapeHtml(sa.result.slice(0, 200)) + '</div>';
      }

      html += '</div>';
    }
    subagentList.innerHTML = html;
  }

  // --- Init ---

  document.addEventListener('DOMContentLoaded', function() {
    loadMessages();
    connectSSE();
    pollSubagents();
    setInterval(pollSubagents, SUBAGENT_POLL_MS);
  });
})();
</script>
{% endblock %}
