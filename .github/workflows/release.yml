name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==========================================================================
  # macOS Build
  # ==========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging
          pip install .
          pip install pywebview>=5.0 || echo "pywebview skipped (macOS uses native Swift window)"

      - name: Build
        run: python build/build.py

      - name: Smoke test packaged app
        run: dist/Cyrene.app/Contents/MacOS/Cyrene --smoke-test

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Cyrene-*.dmg

  # ==========================================================================
  # Windows Build
  # ==========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging
          pip install .
          pip install pywebview>=5.0 || echo "pywebview skipped"
          pip install winloop

      - name: Build
        run: python build/build.py

      - name: Smoke test packaged app
        run: .\dist\Cyrene\Cyrene.exe --smoke-test

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/Cyrene-*-win64.zip

  # ==========================================================================
  # Linux Build
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 libgtk-3-dev libwebkit2gtk-4.1-dev python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo mv /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging
          pip install .
          pip install pywebview>=5.0 || echo "pywebview skipped"

      - name: Build
        run: python build/build.py

      - name: Smoke test packaged app
        run: ./dist/Cyrene/Cyrene --smoke-test

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/Cyrene-*-x86_64.AppImage

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/Cyrene-*-x86_64.tar.gz

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Delete existing assets on current release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not running on a tag; skipping asset cleanup."
            exit 0
          fi
          gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset "$TAG" "$asset" --yes
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
