name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ==========================================================================
  # macOS Build
  # ==========================================================================
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging
          pip install .
          pip install --upgrade typing_extensions pydantic pydantic_core
          pip install pywebview>=5.0 || echo "pywebview skipped (macOS uses native Swift window)"

      - name: Verify critical imports
        run: python -c "from typing_extensions import Sentinel; from pydantic_core import core_schema; print('imports-ok')"

      - name: Build
        run: python build/build.py

      - name: Smoke test packaged app
        run: dist/Cyrene.app/Contents/MacOS/Cyrene --smoke-test

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Cyrene-*.dmg
          if-no-files-found: error

  # ==========================================================================
  # Windows Build
  # ==========================================================================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging pypdf reportlab
          pip install aiosqlite anyio apscheduler croniter fastapi httpx jinja2 python-dotenv python-telegram-bot requests sniffio websockets python-multipart certifi h11 idna
          pip install mcp httpx-sse pydantic pydantic-settings jsonschema referencing rpds-py attrs sse-starlette pyjwt
          pip install pywebview>=5.0 pythonnet clr-loader proxy-tools
          pip install winloop
          # simplexng and its transitive deps (it uses --no-deps so we list them explicitly)
          pip install simplexng --no-deps
          pip install babel brotli clideps flask flask-babel httpx-socks isodate lxml markdown-it-py msgspec platformdirs pyyaml rich setproctitle typer-slim valkey whitenoise
          pip install .
          pip install --upgrade typing_extensions pydantic pydantic_core

      - name: Apply Windows compatibility patches
        shell: python
        run: |
          import os, sys, site

          import simplexng
          sx = simplexng.__path__[0]
          print(f"simplexng at: {sx}")

          # 1. Replace uvloop with winloop
          client_py = os.path.join(sx, "_vendor", "searx", "network", "client.py")
          if os.path.exists(client_py):
              with open(client_py, "r") as f:
                  content = f.read()
              content = content.replace(
                  'import uvloop\nuvloop.install()',
                  'import sys\nif sys.platform == "win32":\n    import winloop as uvloop\nelse:\n    import uvloop\nuvloop.install()'
              )
              with open(client_py, "w") as f:
                  f.write(content)
              print("Patched uvloop -> winloop")
          else:
              print(f"WARNING: {client_py} not found")

          # 2. Replace fork with spawn
          calc_py = os.path.join(sx, "_vendor", "searx", "plugins", "calculator.py")
          if os.path.exists(calc_py):
              with open(calc_py, "r") as f:
                  content = f.read()
              content = content.replace(
                  'mp_fork = multiprocessing.get_context("fork")',
                  'mp_fork = multiprocessing.get_context("fork" if sys.platform != "win32" else "spawn")'
              )
              with open(calc_py, "w") as f:
                  f.write(content)
              print("Patched fork -> spawn")
          else:
              print(f"WARNING: {calc_py} not found")

          # 3. Create pwd stub
          site_pkg = site.getsitepackages()[0]
          pwd_py = os.path.join(site_pkg, "pwd.py")
          with open(pwd_py, "w") as f:
              f.write('''"""pwd stub for Windows - SearXNG compatibility."""
          import os
          def getpwuid(uid):
              name = os.environ.get("USERNAME", "unknown")
              return type("pw", (), {"pw_name": name, "pw_uid": uid})()
          ''')
          print(f"Created pwd stub at {pwd_py}")

          # 4. Enable JSON API in SearXNG settings
          settings_yml = os.path.join(sx, "settings", "settings_template.yml")
          if os.path.exists(settings_yml):
              with open(settings_yml, "r") as f:
                  content = f.read()
              if "formats:" in content and "json" not in content.split("formats:", 1)[1].split("\n\n", 1)[0]:
                  content = content.replace(
                      "formats:\n    - html",
                      "formats:\n    - html\n    - json"
                  )
                  with open(settings_yml, "w") as f:
                      f.write(content)
                  print("Enabled JSON API in SearXNG settings")
          else:
              print(f"WARNING: {settings_yml} not found")

          print("Windows compatibility patches applied.")

      - name: Verify build environment imports
        run: |
          python -c "from typing_extensions import Sentinel; from pydantic_core import core_schema; import anyio, httpx, httpcore, sniffio, aiosqlite, apscheduler, croniter, jinja2, websockets, simplexng, mcp, webview; print('imports-ok')"

      - name: Build
        run: python build/build.py

      - name: Smoke test packaged app
        run: .\dist\Cyrene\Cyrene.exe --smoke-test

      - name: Verify packaged modules
        shell: powershell
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = Get-ChildItem dist\Cyrene-*-win64.zip | Select-Object -First 1
          if (-not $zip) { throw "Windows ZIP output missing" }
          $archive = [System.IO.Compression.ZipFile]::OpenRead($zip.FullName)
          try {
            $entries = $archive.Entries | Select-Object -ExpandProperty FullName
            foreach ($pattern in @(
              'Cyrene/_internal/anyio/',
              'Cyrene/_internal/httpx/',
              'Cyrene/_internal/httpcore/',
              'Cyrene/_internal/sniffio/'
            )) {
              if (-not ($entries -contains $pattern)) {
                throw "Missing packaged module path: $pattern"
              }
            }
          } finally {
            $archive.Dispose()
          }

      - name: Verify ZIP output
        shell: powershell
        run: |
          $files = Get-ChildItem dist\Cyrene-*-win64.zip
          if (-not $files) { throw "Windows ZIP output missing" }

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist/Cyrene-*-win64.zip
          if-no-files-found: error

  # ==========================================================================
  # Linux Build
  # ==========================================================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev python3-gi python3-gi-cairo gir1.2-gtk-3.0 gir1.2-webkit2-4.1
          # libfuse2 is required at link time even for --appimage-extract (the ELF
          # binary is dynamically linked against libfuse.so.2 regardless of runtime
          # code paths).  On ubuntu-24.04 the package is named libfuse2t64.
          sudo apt-get install -y libfuse2t64 || sudo apt-get install -y libfuse2

      - name: Install appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          /tmp/appimagetool --appimage-extract
          sudo mv squashfs-root /opt/appimagetool
          cat <<'WRAPPER' | sudo tee /usr/local/bin/appimagetool > /dev/null
          #!/bin/bash
          export APPDIR=/opt/appimagetool
          exec /opt/appimagetool/AppRun "$@"
          WRAPPER
          sudo chmod +x /usr/local/bin/appimagetool
          appimagetool --version

      - name: Install dependencies
        run: |
          pip install pyinstaller>=6.0 pillow packaging
          pip install .
          pip install --upgrade typing_extensions pydantic pydantic_core
          pip install pywebview>=5.0 || echo "pywebview skipped"

      - name: Verify build environment imports
        run: |
          python -c "from typing_extensions import Sentinel; from pydantic_core import core_schema; import anyio, httpx, httpcore, sniffio, aiosqlite, apscheduler, websockets, simplexng, jinja2, mcp, webview; print('imports-ok')"

      - name: Build
        run: |
          # Put pip site-packages before system path so PyInstaller collects
          # the pip-installed typing_extensions (with Sentinel), not the
          # potentially older system copy from /usr/lib/python3/dist-packages.
          PIP_SITE="$(python -c "import site; print(site.getsitepackages()[0])")"
          export PYTHONPATH="$PIP_SITE:/usr/lib/python3/dist-packages"
          APPIMAGE_EXTRACT_AND_RUN=1 CYRENE_REQUIRE_APPIMAGE=1 python build/build.py

      - name: Smoke test packaged app
        run: ./dist/Cyrene/Cyrene --smoke-test

      - name: Verify AppImage output
        run: ls -la dist/Cyrene-*-x86_64.AppImage

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/Cyrene-*-x86_64.AppImage
          if-no-files-found: error

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/Cyrene-*-x86_64.tar.gz
          if-no-files-found: error

  # ==========================================================================
  # Create GitHub Release
  # ==========================================================================
  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Delete existing assets on current release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Not running on a tag; skipping asset cleanup."
            exit 0
          fi
          gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | while read -r asset; do
            if [ -n "$asset" ]; then
              gh release delete-asset "$TAG" "$asset" --yes
            fi
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
